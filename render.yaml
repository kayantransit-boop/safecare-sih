databases:
  - name: kayan-clinique-db
    databaseName: kayandb
    user: kayan
    plan: free

services:
  - type: web
    name: kayan-clinique-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kayan-clinique-db
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: web
    name: kayan-clinique-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: kayan-clinique-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
